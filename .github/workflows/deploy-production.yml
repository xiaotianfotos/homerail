name: Deploy Production

on:
  schedule:
    # GitHub cron is UTC. 19:30 UTC is 03:30 Asia/Shanghai.
    - cron: "30 19 * * *"
  workflow_dispatch:
    inputs:
      revision:
        description: Optional branch, tag, or commit to deploy
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: homerail-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy persistent HomeRail service
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.actor == 'xiaotianfotos')
    runs-on: [self-hosted, Linux, X64, homerail-deploy]
    timeout-minutes: 45
    steps:
      - name: Check out the validated revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.revision || 'main' }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          # Deployment must not depend on Actions cache availability. The
          # following install step remains deterministic through package locks.

      - name: Install dependencies
        run: npm run install:all

      - name: Build release
        run: npm run build:packages

      - name: Atomically deploy and verify
        run: |
          revision="$(git rev-parse HEAD)"
          HOMERAIL_DEPLOY_REVISION="$revision" bash scripts/deploy-production.sh
