name: HomeRail PR Review

on:
  workflow_dispatch:
    inputs:
      repo:
        description: GitHub owner/repository (defaults to this repository)
        type: string
        required: false
      pr:
        description: Pull request number
        type: number
        required: true
      base:
        description: Optional immutable base commit SHA
        type: string
        required: false
      head:
        description: Optional immutable head commit SHA
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: homerail-pr-review-${{ inputs.pr }}
  cancel-in-progress: true

jobs:
  review:
    name: HomeRail PR Review
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64, homerail-pr-review]
    timeout-minutes: 90
    env:
      HOMERAIL_GITHUB_API_BASE_URL: ${{ github.api_url }}
      HOMERAIL_RUNNER_BASE: ${{ secrets.HOMERAIL_LIVE_RUNNER_BASE }}
      HOMERAIL_MANAGER_PORT: ${{ secrets.HOMERAIL_LIVE_MANAGER_PORT }}
      HOMERAIL_LIVE_WORKER_IMAGE_PREFIX: homerail-worker:pr-review
      HOMERAIL_LIVE_RUN_KEY: pr-review-${{ github.run_id }}-${{ github.run_attempt }}
      HOMERAIL_WAKE_MODEL: "1"
      HOMERAIL_PATTERN_MODEL: qwen3.6
      HOMERAIL_PATTERN_MODEL_BASE_URL: ${{ secrets.HOMERAIL_PATTERN_MODEL_BASE_URL }}
      HOMERAIL_PATTERN_MODEL_PROTOCOL: anthropic_compatible
      HOMERAIL_PATTERN_AGENT_TYPE: claude-sdk
      HOMERAIL_DAG_MUTATION_TOKEN: ${{ secrets.HOMERAIL_DAG_MUTATION_TOKEN }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out HomeRail CLI and tracked scenario
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm run install:all

      - name: Build current HomeRail runtime
        run: npm run build:packages

      - name: Resolve immutable review input
        id: input
        env:
          EVENT_REPO: ${{ github.repository }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_PR: ${{ inputs.pr }}
          INPUT_BASE: ${{ inputs.base }}
          INPUT_HEAD: ${{ inputs.head }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          const input = {
            repo: process.env.INPUT_REPO || process.env.EVENT_REPO,
            pr: Number(process.env.INPUT_PR),
          }
          const base = process.env.INPUT_BASE
          const head = process.env.INPUT_HEAD
          if (base) input.base = base
          if (head) input.head = head
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `json=${JSON.stringify(input)}\n`)
          NODE

      - name: Run HomeRail PR Review DAG
        id: review
        env:
          HOMERAIL_LIVE_SLOT: ${{ runner.name }}
          HOMERAIL_PR_REVIEW_INPUT: ${{ steps.input.outputs.json }}
          HOMERAIL_PR_REVIEW_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/pr-review
        run: bash scripts/run-pr-review-live-runner.sh

      - name: Publish Check summary
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.review.outcome }}
        run: |
          if [ -s artifacts/pr-review/pr-review.md ]; then
            cat artifacts/pr-review/pr-review.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo '# HomeRail PR Review'
              echo
              echo "Result: infrastructure error"
              echo "Command outcome: $STEP_OUTCOME"
              echo
              echo 'No review conclusion was produced. Inspect the failed DAG step and uploaded diagnostics.'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload review evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-review-${{ inputs.pr }}-${{ github.run_id }}
          path: artifacts/pr-review/
          if-no-files-found: warn
          retention-days: 14
