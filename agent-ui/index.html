<!DOCTYPE html>
<html lang="zh-Hans" data-hr-appearance="cockpit">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/icons/homerail-icon-32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/icons/homerail-icon-192.png" sizes="192x192" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon-precomposed.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon-precomposed.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06080d" />
    <script>
      (() => {
        try {
          const storage = window.localStorage
          const current = storage.getItem('homerail.appearance')
          const legacySkin = storage.getItem('homerail.skin')
          const legacyTheme = storage.getItem('omni_theme')
          const systemLight = legacyTheme === 'system'
            && window.matchMedia?.('(prefers-color-scheme: light)').matches
          const stored = current
            || (legacySkin === 'paper' || legacySkin === 'cockpit' ? legacySkin : '')
            || (legacyTheme === 'light' || systemLight ? 'paper' : 'cockpit')
          const storedScheme = storage.getItem('homerail.appearance-color-scheme')
          const scheme = stored === 'paper'
            ? 'light'
            : stored === 'cockpit'
              ? 'dark'
              : storedScheme === 'light' ? 'light' : 'dark'
          document.documentElement.dataset.hrAppearance = stored
          document.documentElement.classList.toggle('dark', scheme === 'dark')
          document.documentElement.style.colorScheme = scheme
          document.querySelector('meta[name="theme-color"]')?.setAttribute(
            'content',
            scheme === 'light' ? '#f5f6f8' : '#06080d',
          )
        } catch {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <meta name="msapplication-TileImage" content="/icons/homerail-icon-144.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="HomeRail" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>HomeRail</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
