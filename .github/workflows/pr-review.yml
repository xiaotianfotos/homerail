name: HomeRail PR Review

on:
  pull_request:
    # Review once per coherent PR instead of on every pushed commit.
    types: [opened, reopened, ready_for_review]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:
    inputs:
      repo:
        description: GitHub owner/repository (defaults to this repository)
        type: string
        required: false
      pr:
        description: Pull request number
        type: number
        required: true
      base:
        description: Optional immutable base commit SHA
        type: string
        required: false
      head:
        description: Optional immutable head commit SHA
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: homerail-pr-review-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

jobs:
  review:
    name: HomeRail PR Review
    if: >-
      github.actor == 'xiaotianfotos' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' &&
        github.event.pull_request.user.login == 'xiaotianfotos' &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository))
    runs-on: [self-hosted, Linux, X64, homerail-pr-review]
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      HOMERAIL_GITHUB_API_BASE_URL: ${{ github.api_url }}
    steps:
      - name: Verify stable runner environment
        id: stable
        shell: bash
        run: |
          set -euo pipefail
          test -n "${HOMERAIL_STABLE_ROOT:-}"
          test -n "${HOMERAIL_STABLE_HOME:-}"
          test -n "${HOMERAIL_STABLE_MANAGER_URL:-}"
          stable_release="$(readlink -f "$HOMERAIL_STABLE_ROOT/current")"
          node_bin="$stable_release/runtime/node"
          test -x "$node_bin"
          test -f "$stable_release/assets/orchestrations/pr-review.yaml.template"
          echo "release=$stable_release" >> "$GITHUB_OUTPUT"
          echo "node=$node_bin" >> "$GITHUB_OUTPUT"
          echo "HOMERAIL_PR_REVIEW_ARTIFACT_DIR=$RUNNER_TEMP/homerail-pr-review-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_ENV"

      - name: Resolve immutable review input
        id: input
        env:
          EVENT_REPO: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          EVENT_PR: ${{ github.event.pull_request.number }}
          EVENT_BASE: ${{ github.event.pull_request.base.sha }}
          EVENT_HEAD: ${{ github.event.pull_request.head.sha }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_PR: ${{ inputs.pr }}
          INPUT_BASE: ${{ inputs.base }}
          INPUT_HEAD: ${{ inputs.head }}
        run: |
          "${{ steps.stable.outputs.node }}" --input-type=module <<'NODE'
          import fs from 'node:fs'
          const input = {
            repo: process.env.INPUT_REPO || process.env.EVENT_REPO,
            pr: Number(process.env.INPUT_PR || process.env.EVENT_PR),
          }
          const base = process.env.INPUT_BASE || process.env.EVENT_BASE
          const head = process.env.INPUT_HEAD || process.env.EVENT_HEAD
          if (!input.repo || !Number.isInteger(input.pr) || input.pr < 1) {
            throw new Error('A repository and pull request number are required')
          }
          if (base) input.base = base
          if (head) input.head = head
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `json=${JSON.stringify(input)}\n`)
          NODE

      - name: Run HomeRail PR Review DAG on stable Manager
        id: review
        env:
          HOMERAIL_PR_REVIEW_INPUT: ${{ steps.input.outputs.json }}
        run: bash "${{ steps.stable.outputs.release }}/scripts/run-pr-review-stable-runner.sh"

      - name: Publish Check summary
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.review.outcome }}
        run: |
          if [ -s "$HOMERAIL_PR_REVIEW_ARTIFACT_DIR/pr-review.md" ]; then
            cat "$HOMERAIL_PR_REVIEW_ARTIFACT_DIR/pr-review.md" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo '# HomeRail PR Review'
              echo
              echo "Result: infrastructure error"
              echo "Command outcome: $STEP_OUTCOME"
              echo
              echo 'No review conclusion was produced. Inspect the stable DAG run and uploaded diagnostics.'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Privacy advisory (human inspection only)
        if: always()
        continue-on-error: true
        run: |
          if [ -s "$HOMERAIL_PR_REVIEW_ARTIFACT_DIR/pr-privacy-review.json" ]; then
            "${{ steps.stable.outputs.node }}" \
              "${{ steps.stable.outputs.release }}/scripts/report-pr-privacy-advisory.mjs" \
              "$HOMERAIL_PR_REVIEW_ARTIFACT_DIR/pr-privacy-review.json"
          fi

      - name: Upload review evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-review-${{ github.event.pull_request.number || inputs.pr }}-${{ github.run_id }}
          path: ${{ runner.temp }}/homerail-pr-review-${{ github.run_id }}-${{ github.run_attempt }}/
          if-no-files-found: warn
          retention-days: 14
