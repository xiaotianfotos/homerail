name: Deploy Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      revision:
        description: Optional branch, tag, or commit to deploy
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: homerail-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy persistent HomeRail service
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository) ||
      (github.event_name == 'workflow_dispatch' && github.actor == 'xiaotianfotos')
    runs-on: [self-hosted, Linux, X64, homerail-deploy]
    timeout-minutes: 45
    steps:
      - name: Check out the validated revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.revision || 'main' }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          # Deployment must not depend on Actions cache availability. The
          # following install step remains deterministic through package locks.

      - name: Install dependencies
        run: npm run install:all

      - name: Build release
        run: npm run build:packages

      - name: Atomically deploy and verify
        env:
          DEPLOY_REVISION: ${{ github.event.workflow_run.head_sha || '' }}
        run: |
          revision="${DEPLOY_REVISION:-$(git rev-parse HEAD)}"
          HOMERAIL_DEPLOY_REVISION="$revision" bash scripts/deploy-production.sh
