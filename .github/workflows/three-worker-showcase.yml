name: Three-Worker Showcase

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or commit to validate (defaults to the selected workflow ref)
        type: string
        required: false
      asset_path:
        description: Absolute path to an external three-Actor Workflow on the self-hosted runner
        type: string
        required: true
      mission:
        description: One explicit mission for the selected external Workflow
        type: string
        required: true
      required_surface_terms:
        description: Comma-separated mission terms every Actor Surface must retain
        type: string
        required: true
      wake_model:
        description: Wake the Qwen model host when it is offline
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: three-worker-showcase-live
  cancel-in-progress: false

jobs:
  acceptance:
    name: Real three-Worker acceptance
    if: github.actor == 'xiaotianfotos'
    runs-on: [self-hosted, Linux, X64, homerail-live]
    timeout-minutes: 90
    env:
      HOMERAIL_RUNNER_BASE: ${{ secrets.HOMERAIL_LIVE_RUNNER_BASE }}
      HOMERAIL_MANAGER_PORT: ${{ secrets.HOMERAIL_LIVE_MANAGER_PORT }}
      HOMERAIL_LIVE_WORKER_IMAGE_PREFIX: homerail-worker:three-worker-showcase
      HOMERAIL_LIVE_RUN_KEY: showcase-${{ github.run_id }}-${{ github.run_attempt }}
      HOMERAIL_LIVE_REPORT_PATH: ${{ github.workspace }}/artifacts/three-worker-showcase/acceptance.json
      HOMERAIL_WAKE_MODEL: ${{ inputs.wake_model && '1' || '0' }}
      HOMERAIL_PATTERN_MODEL: qwen3.6
      HOMERAIL_PATTERN_MODEL_BASE_URL: ${{ secrets.HOMERAIL_PATTERN_MODEL_BASE_URL }}
      HOMERAIL_PATTERN_MODEL_PROTOCOL: anthropic_compatible
      HOMERAIL_PATTERN_AGENT_TYPE: claude-sdk
      HOMERAIL_SHOWCASE_ASSET: ${{ inputs.asset_path }}
      HOMERAIL_SHOWCASE_PROMPT: ${{ inputs.mission }}
      HOMERAIL_SHOWCASE_REQUIRED_TERMS: ${{ inputs.required_surface_terms }}
    steps:
      - name: Check out target revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.target_ref || github.ref }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm run install:all

      - name: Build packages
        run: npm run build:packages

      - name: Run isolated real-model acceptance
        env:
          HOMERAIL_LIVE_SLOT: ${{ runner.name }}
        run: npm run validate:three-worker-showcase-runner

      - name: Publish acceptance summary
        if: always()
        run: |
          if [ -s artifacts/three-worker-showcase/acceptance.json ]; then
            node --input-type=module <<'NODE'
            import fs from 'node:fs'
            const report = JSON.parse(fs.readFileSync('artifacts/three-worker-showcase/acceptance.json', 'utf8'))
            const lines = [
              '# Three-Worker Showcase',
              '',
              `Result: ${report.passed === true ? 'PASS' : 'FAIL'}`,
              `Run: ${report.run?.run_id ?? 'unavailable'}`,
              `Model: ${report.model ?? 'unavailable'}`,
              `Actors: ${Array.isArray(report.actor_ids) ? report.actor_ids.join(', ') : 'unavailable'}`,
            ]
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`)
            NODE
          else
            printf '# Three-Worker Showcase\n\nResult: infrastructure error\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: three-worker-showcase-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/three-worker-showcase/
          if-no-files-found: warn
          retention-days: 14
