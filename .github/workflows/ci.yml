name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      live_patterns:
        description: Run model-backed DAG pattern validation on the self-hosted live runner
        type: boolean
        default: false
      target_ref:
        description: Branch, tag, or commit to validate (defaults to the selected workflow ref)
        type: string
        required: false
      wake_model:
        description: Wake the Qwen model host when it is offline
        type: boolean
        default: true
      patterns:
        description: Optional comma-separated pattern IDs (empty runs the full catalog)
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name == 'workflow_dispatch' && inputs.live_patterns && 'dag-live' || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core-linux:
    name: Core (Linux, Node ${{ matrix.node-version }})
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'workflow_dispatch' || !inputs.live_patterns)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            homerail_protocol/package-lock.json
            homerail_manager/package-lock.json
            homerail_node/package-lock.json
            homerail_worker/package-lock.json
            homerail_cli/package-lock.json
            agent-ui/package-lock.json

      - name: Install dependencies
        run: npm run install:all

      - name: Typecheck, build, and test
        env:
          HOMERAIL_HOME: ${{ runner.temp }}/homerail-ci-node-${{ matrix.node-version }}
        run: npm run ci

  core-windows:
    name: Core (Windows, Node 24)
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'workflow_dispatch' || !inputs.live_patterns)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            homerail_protocol/package-lock.json
            homerail_manager/package-lock.json
            homerail_node/package-lock.json
            homerail_worker/package-lock.json
            homerail_cli/package-lock.json
            agent-ui/package-lock.json

      - name: Install dependencies
        run: npm run install:all

      - name: Typecheck, build, and test
        env:
          HOMERAIL_HOME: ${{ runner.temp }}/homerail-ci
        run: npm run ci

  agent-ui-coverage:
    name: Agent UI coverage
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'workflow_dispatch' || !inputs.live_patterns)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            homerail_protocol/package-lock.json
            agent-ui/package-lock.json

      - name: Install dependencies
        run: |
          npm --prefix homerail_protocol ci
          npm --prefix homerail_protocol run build
          npm --prefix agent-ui ci

      - name: Run full-source coverage
        run: npm --prefix agent-ui run test:coverage

  docker-smoke:
    name: Docker smoke
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'workflow_dispatch' || !inputs.live_patterns)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: homerail_node/package-lock.json

      - name: Install Node dependencies
        run: npm --prefix homerail_node ci

      - name: Run real Docker lifecycle test
        env:
          DOCKER_TEST: "1"
        run: npm --prefix homerail_node test -- src/providers/__tests__/docker-cli-provider.integration.test.ts

      - name: Build Worker image
        run: docker build -t homerail-worker:ci -f homerail_worker/Dockerfile .

  live-dag-patterns:
    name: Live DAG patterns (self-hosted Qwen3.6)
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       inputs.live_patterns &&
       github.actor == 'xiaotianfotos') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       github.actor == 'xiaotianfotos' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, Linux, X64, homerail-live]
    timeout-minutes: 90
    env:
      HOMERAIL_RUNNER_BASE: ${{ secrets.HOMERAIL_LIVE_RUNNER_BASE }}
      HOMERAIL_MANAGER_PORT: ${{ secrets.HOMERAIL_LIVE_MANAGER_PORT }}
      HOMERAIL_LIVE_WORKER_IMAGE_PREFIX: homerail-worker:dag-live
      HOMERAIL_WAKE_MODEL: ${{ github.event_name == 'pull_request' && '1' || inputs.wake_model && '1' || '0' }}
      HOMERAIL_LIVE_PATTERNS: ${{ github.event_name == 'workflow_dispatch' && inputs.patterns || '' }}
      HOMERAIL_LIVE_RUN_KEY: ${{ github.run_id }}-${{ github.run_attempt }}
      HOMERAIL_LIVE_REPORT_PATH: ${{ github.workspace }}/artifacts/dag-patterns-live.json
      HOMERAIL_PATTERN_MODEL: qwen3.6
      HOMERAIL_PATTERN_MODEL_BASE_URL: ${{ secrets.HOMERAIL_PATTERN_MODEL_BASE_URL }}
      HOMERAIL_PATTERN_MODEL_PROTOCOL: anthropic_compatible
      HOMERAIL_PATTERN_AGENT_TYPE: claude-sdk
    steps:
      - name: Check out target revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm run install:all

      - name: Build packages
        run: npm run build:packages

      - name: Select immutable issue diagnosis revision
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          revision="${PR_BASE_SHA:-$(git rev-parse HEAD)}"
          echo "HOMERAIL_LIVE_ISSUE_REVISION=$revision" >> "$GITHUB_ENV"

      - name: Run isolated live DAG pattern validation
        env:
          HOMERAIL_LIVE_SLOT: ${{ runner.name }}
        run: npm run validate:dag-patterns-runner

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dag-patterns-live-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
